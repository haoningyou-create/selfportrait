name: Deploy to Gitee Pages (Mainland China mirror)

# 在 GitHub 仓库 Settings → Secrets 中配置：
#   GITEE_USERNAME  — Gitee 用户名
#   GITEE_TOKEN     — Gitee 私人令牌（repo 权限）
# 并在 Gitee 创建同名仓库 haoningyou-create/selfportrait，开启 Gitee Pages

on:
  workflow_dispatch:

jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build:static
        env:
          STATIC_EXPORT: "true"
          BASE_PATH: /selfportrait

      - name: Deploy to Gitee Pages
        uses: yanglb/gitee-pages-action@v3
        with:
          gitee-username: ${{ secrets.GITEE_USERNAME }}
          gitee-password: ${{ secrets.GITEE_TOKEN }}
          gitee-repo: ${{ secrets.GITEE_USERNAME }}/selfportrait
          directory: ./out
          branch: main
